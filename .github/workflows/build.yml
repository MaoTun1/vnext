name: Ultimate Security Scan

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # ORTAM KURULUMLARI (Node.js & .NET)
      # -------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # -------------------------------------------------
      # FIND SOLUTION & RESTORE
      # -------------------------------------------------
      - name: Find solution file
        id: find_sln
        shell: bash
        run: |
          SLN_FILE=$(find . -name "*.sln" | head -n 1)
          if [ -z "$SLN_FILE" ]; then
            echo "sln_exists=false" >> $GITHUB_OUTPUT
          else
            echo "sln_exists=true" >> $GITHUB_OUTPUT
            echo "sln_file=$SLN_FILE" >> $GITHUB_OUTPUT
          fi

      - name: Restore dependencies
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        run: |
          dotnet restore "${{ steps.find_sln.outputs.sln_file }}" --use-lock-file
          if [ -f package.json ]; then npm install --package-lock-only; fi

      - name: Build solution
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        run: |
          dotnet build "${{ steps.find_sln.outputs.sln_file }}" --configuration Release --no-restore

      # -------------------------------------------------
      # RAPOR DİZİNİNİ HAZIRLAMA
      # -------------------------------------------------
      - name: Create Reports Directory
        run: mkdir -p security-reports-dir

      # -------------------------------------------------
      # SEMGREP (SARIF Çıktısı)
      # -------------------------------------------------
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/security-audit
            p/secrets
            p/owasp-top-ten
          sarif: true
      
      - name: Move Semgrep Report
        if: always()
        run: |
          if [ -f semgrep.sarif ]; then
            mv semgrep.sarif security-reports-dir/semgrep.sarif
          fi

      # -------------------------------------------------
      # GITLEAKS (SARIF Çıktısı)
      # -------------------------------------------------
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          format: sarif
          output: security-reports-dir/gitleaks.sarif

      # -------------------------------------------------
      # TRUFFLEHOG (Detaylı Markdown Raporu)
      # -------------------------------------------------
      - name: Run TruffleHog
        continue-on-error: true
        run: |
          # TruffleHog için insan gözüne hitap eden bir text/markdown log üretiyoruz
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --only-verified=false > security-reports-dir/Trufflehog-Secret-Raporu.md || true

      # -------------------------------------------------
      # TRIVY FS SCAN -> HTML RAPORU
      # -------------------------------------------------
      - name: Run Trivy Filesystem Scan (HTML)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'template'
          template: '@contrib/html.tpl'
          output: 'security-reports-dir/Trivy-Genel-Zafiyet-Raporu.html'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

      # -------------------------------------------------
      # TRIVY: GENERATE SBOM (Ham Veri)
      # -------------------------------------------------
      - name: Generate SBOM using Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          format: 'cyclonedx'
          output: 'security-reports-dir/sbom.json'

      # -------------------------------------------------
      # TRIVY: SCAN GENERATED SBOM -> HTML RAPORU
      # -------------------------------------------------
      - name: Scan Generated SBOM using Trivy (HTML)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'sbom'
          scan-ref: 'security-reports-dir/sbom.json'
          format: 'template'
          template: '@contrib/html.tpl'
          output: 'security-reports-dir/Trivy-SBOM-Zafiyet-Raporu.html'
          severity: 'CRITICAL,HIGH'

      # -------------------------------------------------
      # DİĞER ARAÇLARIN LOGLARINI GÜZELLEŞTİRME (Trivy Convert HTML)
      # -------------------------------------------------
      - name: Convert Other SARIFs to HTML using Trivy CLI
        if: always()
        shell: bash
        run: |
          # Pipeline ortamına yüklü gelen Docker üzerinden Trivy imajını çağırıp, convert komutunu çalıştırıyoruz.
          # Bu sayede Semgrep ve Gitleaks raporları da Trivy HTML arayüzüne kavuşuyor.
          
          if [ -f security-reports-dir/semgrep.sarif ]; then
            docker run --rm -v "$PWD/security-reports-dir:/reports" aquasec/trivy:latest convert \
              --format template --template "@contrib/html.tpl" --output /reports/Semgrep-Kod-Analiz-Raporu.html /reports/semgrep.sarif || true
          fi
          
          if [ -f security-reports-dir/gitleaks.sarif ]; then
            docker run --rm -v "$PWD/security-reports-dir:/reports" aquasec/trivy:latest convert \
              --format template --template "@contrib/html.tpl" --output /reports/Gitleaks-Secret-Raporu.html /reports/gitleaks.sarif || true
          fi

      # -------------------------------------------------
      # TÜM RAPORLARI TEK BİR ARTIFACT OLARAK YÜKLEME
      # -------------------------------------------------
      - name: Upload Master Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Butun-Guvenlik-Raporlari
          path: security-reports-dir/
