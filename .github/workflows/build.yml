name: Universal Security Scan

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  security-scan:
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      #####################################################
      ## CHECKOUT
      #####################################################
      - name: Checkout source code
        uses: actions/checkout@v4

      #####################################################
      ## .NET SETUP
      #####################################################
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      #####################################################
      ## DETECT SOLUTION (FIX MSB1011)
      #####################################################
      - name: Detect solution file
        id: detect
        run: |
          SLN=$(find . -name "*.sln" | head -n 1)
          echo "sln=$SLN" >> $GITHUB_OUTPUT

          if [ -n "$SLN" ]; then
            echo "Found solution: $SLN"
          else
            echo "No solution file found"
          fi

      #####################################################
      ## RESTORE
      #####################################################
      - name: Restore dependencies
        run: |
          if [ -n "${{ steps.detect.outputs.sln }}" ]; then
            dotnet restore "${{ steps.detect.outputs.sln }}" --use-lock-file
          else
            find . -name "*.csproj" -exec dotnet restore {} \;
          fi

      #####################################################
      ## BUILD
      #####################################################
      - name: Build project
        run: |
          if [ -n "${{ steps.detect.outputs.sln }}" ]; then
            dotnet build "${{ steps.detect.outputs.sln }}" --configuration Release --no-restore
          else
            find . -name "*.csproj" -exec dotnet build {} --configuration Release \;
          fi

      #####################################################
      ## CACHE (NuGet)
      #####################################################
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}

      #####################################################
      ## SEMGREP
      #####################################################
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep --config auto --json --output semgrep.json || true

      #####################################################
      ## TRIVY (FULL SCAN)
      #####################################################
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,config
          format: table
          output: trivy-report.txt

      #####################################################
      ## TRUFFLEHOG
      #####################################################
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          extra_args: --only-verified --json

      #####################################################
      ## REPORT GENERATION
      #####################################################
      - name: Generate Report
        run: |
          echo "# 🔐 Security Scan Report" > report.md
          echo "Generated: $(date -u)" >> report.md

          echo "## 🧠 Semgrep" >> report.md
          if [ -s semgrep.json ]; then
            cat semgrep.json >> report.md
          else
            echo "No issues found ✅" >> report.md
          fi

          echo "## 📦 Trivy" >> report.md
          if [ -s trivy-report.txt ]; then
            echo '```' >> report.md
            cat trivy-report.txt >> report.md
            echo '```' >> report.md
          else
            echo "No vulnerabilities found ✅" >> report.md
          fi

      #####################################################
      ## PAGES DEPLOY (FIXED)
      #####################################################
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      #####################################################
      ## ARTIFACT
      #####################################################
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: report.md

      #####################################################
      ## SUMMARY
      #####################################################
      - name: GitHub Summary
        run: |
          echo "### 🔐 Security Scan Completed" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 Report generated" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Pages deployed" >> $GITHUB_STEP_SUMMARY

      #####################################################
      ## PR COMMENT
      #####################################################
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: security-scan
          message: |
            ✅ Security scan completed
            📄 Report available in artifacts
            🌐 GitHub Pages deployed
