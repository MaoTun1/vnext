name: Security Scan

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # .NET SETUP
      # -------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # -------------------------------------------------
      # FIND SOLUTION
      # -------------------------------------------------
      - name: Find solution file
        id: find_sln
        shell: bash
        run: |
          SLN_FILE=$(find . -name "*.sln" | head -n 1)

          if [ -z "$SLN_FILE" ]; then
            echo "No solution file found"
            echo "sln_exists=false" >> $GITHUB_OUTPUT
          else
            echo "Found solution: $SLN_FILE"
            echo "sln_exists=true" >> $GITHUB_OUTPUT
            echo "sln_file=$SLN_FILE" >> $GITHUB_OUTPUT
          fi

      # -------------------------------------------------
      # RESTORE
      # -------------------------------------------------
      - name: Restore dependencies
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        run: |
          dotnet restore "${{ steps.find_sln.outputs.sln_file }}" --use-lock-file

      # -------------------------------------------------
      # BUILD (NON-BLOCKING)
      # -------------------------------------------------
      - name: Build solution
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        run: |
          dotnet build "${{ steps.find_sln.outputs.sln_file }}" \
            --configuration Release \
            --no-restore

      # -------------------------------------------------
      # GENERATE SBOM
      # -------------------------------------------------
      - name: Install CycloneDX tool
        run: |
          dotnet tool install --global CycloneDX

      - name: Generate SBOM
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p sbom

          dotnet-CycloneDX \
            "${{ steps.find_sln.outputs.sln_file }}" \
            -o sbom

          echo "SBOM generated"

      # -------------------------------------------------
      # SEMGREP
      # -------------------------------------------------
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/security-audit
            p/secrets
            p/owasp-top-ten

      # -------------------------------------------------
      # GITLEAKS
      # -------------------------------------------------
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------
      # TRUFFLEHOG
      # -------------------------------------------------
      - name: Run TruffleHog
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --only-verified=false \
            --json > trufflehog-results.json || true

          echo "TruffleHog scan completed"

      # -------------------------------------------------
      # TRIVY FS SCAN
      # -------------------------------------------------
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      # -------------------------------------------------
      # TRIVY SBOM SCAN
      # -------------------------------------------------
      - name: Run Trivy SBOM Scan
        continue-on-error: true
        run: |
          if ls sbom/*.json 1> /dev/null 2>&1; then
            docker run --rm \
              -v "$PWD:/work" \
              aquasec/trivy:latest sbom \
              /work/sbom/*.json \
              --severity HIGH,CRITICAL \
              --format table
          else
            echo "No SBOM found, skipping Trivy SBOM scan"
          fi

      # -------------------------------------------------
      # UPLOAD REPORTS
      # -------------------------------------------------
      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            trufflehog-results.json
            sbom/
