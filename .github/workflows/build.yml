name: Universal Security Scan

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  security-scan:
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      #####################################################
      ## CHECKOUT
      #####################################################
      - name: Checkout source code
        uses: actions/checkout@v4

      #####################################################
      ## .NET DEPENDENCY GENERATION
      #####################################################
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Restore dependencies (create lock file)
        run: dotnet restore vnex.sln --use-lock-file

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      #####################################################
      ## CACHE (NuGet)
      #####################################################
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}

      #####################################################
      ## SEMGREP
      #####################################################
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep --config auto --json --output semgrep.json || true

      #####################################################
      ## TRIVY (C# + config + secrets)
      #####################################################
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,config
          format: table
          output: trivy-report.txt

      #####################################################
      ## TRUFFLEHOG (FIXED)
      #####################################################
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          extra_args: --only-verified --json

      #####################################################
      ## REPORT
      #####################################################
      - name: Generate Report
        run: |
          echo "# 🔐 Security Scan Report" > report.md
          echo "Generated: $(date -u)" >> report.md

          echo "## 🧠 Semgrep" >> report.md
          if [ -s semgrep.json ]; then
            cat semgrep.json >> report.md
          else
            echo "No issues found ✅" >> report.md
          fi

          echo "## 📦 Trivy" >> report.md
          if [ -s trivy-report.txt ]; then
            echo '```' >> report.md
            cat trivy-report.txt >> report.md
            echo '```' >> report.md
          else
            echo "No vulnerabilities found ✅" >> report.md
          fi

      #####################################################
      ## PAGES (FIXED - NO INVALID MAPPING)
      #####################################################
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      #####################################################
      ## ARTIFACT
      #####################################################
      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: report.md

      #####################################################
      ## SUMMARY
      #####################################################
      - name: GitHub Summary
        run: |
          echo "### 🔐 Security Scan Completed" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 Report artifact generated" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 GitHub Pages deployed" >> $GITHUB_STEP_SUMMARY

      #####################################################
      ## PR COMMENT
      #####################################################
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: security-scan
          message: |
            ✅ Security scan completed
            📄 Report available in artifacts
            🌐 Pages deployed successfully
