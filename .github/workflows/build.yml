name: Universal Security Scan

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-scan:
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:

      #####################################################
      ## CHECKOUT
      #####################################################
      - name: Checkout source code
        uses: actions/checkout@v5

      #####################################################
      ## PYTHON
      #####################################################
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      #####################################################
      ## SYSTEM DEPENDENCIES
      #####################################################
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq pandoc

      #####################################################
      ## SEMGREP
      #####################################################
      - name: Install Semgrep
        run: |
          pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep --config auto --quiet > semgrep-report.txt || true

      #####################################################
      ## GITLEAKS
      #####################################################
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.2"
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          git fetch --unshallow || true
          gitleaks detect \
            --report-format json \
            --report-path gitleaks-report.json \
            --redact \
            || true

      #####################################################
      ## TRUFFLEHOG (FIXED)
      #####################################################
      - name: Run TruffleHog
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --json \
            --only-verified \
            --exclude-paths=node_modules,vendor \
            > trufflehog-report.json || true

      #####################################################
      ## TRIVY
      #####################################################
      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          output: trivy-report.txt

      #####################################################
      ## REPORT GENERATION
      #####################################################
      - name: Generate Markdown Report
        run: |
          cat << 'EOF' > report.md
# 🔐 Security Scan Report

Generated: $(date)

---

## 🧠 Semgrep Findings
EOF

          if [ -s semgrep-report.txt ]; then
            echo "\`\`\`" >> report.md
            cat semgrep-report.txt >> report.md
            echo "\`\`\`" >> report.md
          else
            echo "✅ No issues found" >> report.md
          fi

          echo "" >> report.md
          echo "## 🕵️ Gitleaks" >> report.md

          if [ -s gitleaks-report.json ]; then
            jq -r '.[] | "- " + .RuleID + " in `" + .File + "`"' gitleaks-report.json >> report.md
          else
            echo "✅ No secrets found" >> report.md
          fi

          echo "" >> report.md
          echo "## 🐷 TruffleHog" >> report.md

          if [ -s trufflehog-report.json ]; then
            echo "- Secrets scan completed (check raw JSON)" >> report.md
          else
            echo "✅ No secrets found" >> report.md
          fi

          echo "" >> report.md
          echo "## 📦 Trivy Results" >> report.md
          echo "\`\`\`" >> report.md
          cat trivy-report.txt >> report.md
          echo "\`\`\`" >> report.md

      #####################################################
      ## HTML EXPORT
      #####################################################
      - name: Convert to HTML
        run: |
          mkdir -p public
          pandoc report.md \
            -f markdown \
            -t html5 \
            --standalone \
            -o public/index.html

      #####################################################
      ## DEBUG
      #####################################################
      - name: Debug output
        run: |
          ls -la public
          head -20 public/index.html

      #####################################################
      ## GITHUB PAGES (FIXED OFFICIAL WAY)
      #####################################################
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      #####################################################
      ## ARTIFACT
      #####################################################
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: report.md

      #####################################################
      ## SUMMARY
      #####################################################
      - name: GitHub Summary
        run: |
          echo "### 🔐 Security Scan Completed" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 Artifacts available in Actions tab" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Pages: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY

      #####################################################
      ## PR COMMENT
      #####################################################
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: security-scan
          message: |
            ✅ Security scan completed

            📄 Artifacts:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            🌐 Pages:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
