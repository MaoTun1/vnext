name: Ultimate Security Scan

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # ORTAM KURULUMLARI (Node.js & .NET)
      # -------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # -------------------------------------------------
      # FIND SOLUTION & RESTORE
      # -------------------------------------------------
      - name: Find solution file
        id: find_sln
        shell: bash
        run: |
          SLN_FILE=$(find . -name "*.sln" | head -n 1)
          if [ -z "$SLN_FILE" ]; then
            echo "sln_exists=false" >> $GITHUB_OUTPUT
          else
            echo "sln_exists=true" >> $GITHUB_OUTPUT
            echo "sln_file=$SLN_FILE" >> $GITHUB_OUTPUT
          fi

      - name: Restore dependencies
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        run: |
          dotnet restore "${{ steps.find_sln.outputs.sln_file }}" --use-lock-file
          if [ -f package.json ]; then npm install --package-lock-only; fi

      - name: Build solution
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        run: |
          dotnet build "${{ steps.find_sln.outputs.sln_file }}" --configuration Release --no-restore

      # -------------------------------------------------
      # RAPOR DİZİNİNİ HAZIRLAMA
      # -------------------------------------------------
      - name: Create Reports Directory
        run: mkdir -p security-reports-dir

      # -------------------------------------------------
      # SEMGREP (SARIF Çıktısı)
      # -------------------------------------------------
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/security-audit
            p/secrets
            p/owasp-top-ten
          sarif: true
      
      - name: Move Semgrep Report
        if: always()
        run: |
          if [ -f semgrep.sarif ]; then
            mv semgrep.sarif security-reports-dir/semgrep.sarif
          fi

      # -------------------------------------------------
      # GITLEAKS (SARIF Çıktısı)
      # -------------------------------------------------
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          format: sarif
          output: security-reports-dir/gitleaks.sarif

      # -------------------------------------------------
      # TRUFFLEHOG (SARIF Çıktısı)
      # -------------------------------------------------
      - name: Run TruffleHog
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --only-verified=false \
            --scandash > trufflehog-raw.json || true
          
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            convert --format=sarif /repo/trufflehog-raw.json > security-reports-dir/trufflehog.sarif || true

      # -------------------------------------------------
      # TRIVY FS SCAN (SARIF Çıktısı)
      # -------------------------------------------------
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'security-reports-dir/trivy-fs.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

      # -------------------------------------------------
      # TRIVY: GENERATE SBOM & SCAN (SARIF Çıktısı)
      # -------------------------------------------------
      - name: Generate SBOM using Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          format: 'cyclonedx'
          output: 'security-reports-dir/sbom.json'

      - name: Scan Generated SBOM using Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'sbom'
          scan-ref: 'security-reports-dir/sbom.json'
          format: 'sarif'
          output: 'security-reports-dir/trivy-sbom.sarif'
          severity: 'CRITICAL,HIGH'

      # -------------------------------------------------
      # MERKEZİ HTML RAPORU OLUŞTURMA (SARIF -> HTML)
      # -------------------------------------------------
      - name: Merge and Generate Master HTML Report
        if: always()
        shell: bash
        run: |
          npm install -g @microsoft/sarif-multitool
          
          # Hata almamak için dizindeki tüm .sarif dosyalarını bir değişkene toplayıp gönderiyoruz
          SARIF_FILES=$(find security-reports-dir -name "*.sarif" | tr '\n' ' ')
          
          if [ -n "$SARIF_FILES" ]; then
            # Dosyaları birleştir
            sarif-multitool merge $SARIF_FILES --output-file=security-reports-dir/master-security.sarif
            
            # HTML'e dönüştür
            sarif-multitool transform security-reports-dir/master-security.sarif --format HTML --output-file=security-reports-dir/Butun-Guvenlik-Raporu.html
          else
            echo "Birleştirilecek SARIF raporu bulunamadı."
          fi

      # -------------------------------------------------
      # TÜM RAPORLARI TEK BİR ARTIFACT OLARAK YÜKLEME
      # -------------------------------------------------
      - name: Upload Master Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Bütün-Güvenlik-Raporları
          path: security-reports-dir/
