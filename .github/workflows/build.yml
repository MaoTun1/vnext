name: Universal Security Scan

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      #####################################################
      ## CHECKOUT
      #####################################################
      - name: Checkout source code
        uses: actions/checkout@v5

      #####################################################
      ## PYTHON
      #####################################################
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      #####################################################
      ## SYSTEM DEPENDENCIES
      #####################################################
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq pandoc

      #####################################################
      ## SEMGREP
      #####################################################
      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep --config auto --quiet \
          > semgrep-report.txt || true

      #####################################################
      ## GITLEAKS
      #####################################################
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.2"

          curl -sSL \
          "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
          -o gitleaks.tar.gz

          tar -xzf gitleaks.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          git fetch --unshallow || true

          gitleaks detect \
            --report-format json \
            --report-path gitleaks-report.json \
            --redact \
            --verbose \
            || true

      #####################################################
      ## TRUFFLEHOG
      #####################################################
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.90.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_format: json
          output_file: trufflehog-report.json

      #####################################################
      ## TRIVY
      #####################################################
      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          output: trivy-report.txt

      #####################################################
      ## GENERATE BEAUTIFUL REPORT
      #####################################################
      - name: Generate Markdown Report
        run: |
          cat << 'EOF' > report.md
          <style>
          body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #0f172a;
            color: #e2e8f0;
          }

          h1,h2,h3 {
            color: #38bdf8;
          }

          table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: #1e293b;
          }

          th, td {
            border: 1px solid #334155;
            padding: 10px;
            text-align: left;
          }

          th {
            background: #0ea5e9;
            color: white;
          }

          tr:nth-child(even) {
            background: #172033;
          }

          code {
            background: #1e293b;
            padding: 2px 6px;
            border-radius: 4px;
            color: #facc15;
          }

          .critical { color: #ef4444; font-weight: bold; }
          .high { color: #f97316; font-weight: bold; }
          .medium { color: #eab308; font-weight: bold; }
          .low { color: #22c55e; font-weight: bold; }

          details {
            margin-bottom: 15px;
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
          }

          summary {
            cursor: pointer;
            font-weight: bold;
            color: #38bdf8;
          }
          </style>

          # 🔐 Security Scan Report

          Generated on: $(date)

          ---

          ## 📊 Scan Summary

          EOF

          #####################################################
          ## TRIVY SUMMARY
          #####################################################

          echo "| Scanner | Critical | High | Medium | Low |" >> report.md
          echo "|---|---|---|---|---|" >> report.md

          CRITICAL=$(grep -o "CRITICAL: [0-9]*" trivy-report.txt | awk '{sum+=$2} END {print sum+0}')
          HIGH=$(grep -o "HIGH: [0-9]*" trivy-report.txt | awk '{sum+=$2} END {print sum+0}')
          MEDIUM=$(grep -o "MEDIUM: [0-9]*" trivy-report.txt | awk '{sum+=$2} END {print sum+0}')
          LOW=$(grep -o "LOW: [0-9]*" trivy-report.txt | awk '{sum+=$2} END {print sum+0}')

          echo "| Scanner | Critical | High | Medium | Low |" >> report.md
          echo "|---|---|---|---|---|" >> report.md
          echo "| Trivy | <span class='critical'>$CRITICAL</span> | <span class='high'>$HIGH</span> | <span class='medium'>$MEDIUM</span> | <span class='low'>$LOW</span> |" >> report.md

          #####################################################
          ## SEMGREP
          #####################################################

          echo "" >> report.md
          echo "## 🧠 Semgrep Findings" >> report.md

          if [ -s semgrep-report.txt ]; then
            echo "<details><summary>View Semgrep Results</summary>" >> report.md
            echo "" >> report.md
            echo '```' >> report.md
            cat semgrep-report.txt >> report.md
            echo '```' >> report.md
            echo "</details>" >> report.md
          else
            echo "✅ No Semgrep issues found" >> report.md
          fi

          #####################################################
          ## GITLEAKS
          #####################################################

          echo "" >> report.md
          echo "## 🕵️ Gitleaks Secrets" >> report.md

          if [ -s gitleaks-report.json ]; then
            echo "| Rule | File | Line |" >> report.md
            echo "|---|---|---|" >> report.md

            jq -r '.[] | "| " + .RuleID + " | `" + .File + "` | " + (.StartLine|tostring) + " |"' \
            gitleaks-report.json >> report.md
          else
            echo "✅ No secrets found" >> report.md
          fi

          #####################################################
          ## TRUFFLEHOG
          #####################################################

          echo "" >> report.md
          echo "## 🔍 TruffleHog" >> report.md

          if [ -s trufflehog-report.json ]; then
            echo "<details><summary>View TruffleHog Results</summary>" >> report.md
            echo "" >> report.md

            jq -r '.results[]?.StringsFound[]? | "- Secret found in `" + .SourceMetadata.Data + "`"' \
            trufflehog-report.json >> report.md

            echo "</details>" >> report.md
          else
            echo "✅ No historical secrets found" >> report.md
          fi

          #####################################################
          ## TRIVY DETAILS
          #####################################################

          echo "" >> report.md
          echo "## 📦 Trivy Vulnerabilities" >> report.md

          echo "<details><summary>View Full Trivy Report</summary>" >> report.md
          echo "" >> report.md
          echo '```' >> report.md
          cat trivy-report.txt >> report.md
          echo '```' >> report.md
          echo "</details>" >> report.md

      #####################################################
      ## CONVERT TO HTML
      #####################################################
      - name: Convert Markdown to HTML
        run: |
          mkdir -p public

          pandoc report.md \
            -f markdown \
            -t html5 \
            --standalone \
            --metadata title="Security Scan Report" \
            -o public/index.html

      #####################################################
      ## DEBUG OUTPUT
      #####################################################
      - name: Debug public folder
        run: |
          ls -la public
          head -20 public/index.html

      #####################################################
      ## GITHUB PAGES
      #####################################################
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      #####################################################
      ## ARTIFACT
      #####################################################
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          path: |
            report.md
            public/index.html

      #####################################################
      ## STEP SUMMARY
      #####################################################
      - name: GitHub Summary UI
        run: |
          echo "### 🔐 Security Scan Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 [Download Workflow Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 [View HTML Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY

      #####################################################
      ## PR COMMENT
      #####################################################
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: security-scan
          message: |
            ✅ Security scan completed

            📄 Workflow Artifacts:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            🌐 HTML Report:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
