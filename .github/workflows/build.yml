name: Ultimate Security Scan

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # ORTAM KURULUMLARI (Node.js & .NET)
      # -------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # -------------------------------------------------
      # GITLEAKS & SEMGREP CLI KURULUMLARI
      # -------------------------------------------------
      - name: Install Tools (Gitleaks & Semgrep)
        run: |
          mkdir -p security-reports-dir
          # Gitleaks Kurulumu
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xf gitleaks_8.18.2_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          # Semgrep Kurulumu
          pip install semgrep

      # -------------------------------------------------
      # FIND SOLUTION & RESTORE
      # -------------------------------------------------
      - name: Find solution file
        id: find_sln
        shell: bash
        run: |
          SLN_FILE=$(find . -name "*.sln" | head -n 1)
          if [ -z "$SLN_FILE" ]; then
            echo "sln_exists=false" >> $GITHUB_OUTPUT
          else
            echo "sln_exists=true" >> $GITHUB_OUTPUT
            echo "sln_file=$SLN_FILE" >> $GITHUB_OUTPUT
          fi

      - name: Restore dependencies
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        run: |
          dotnet restore "${{ steps.find_sln.outputs.sln_file }}" --use-lock-file
          if [ -f package.json ]; then npm install --package-lock-only; fi

      # -------------------------------------------------
      # BUILD (Uyarılardan dolayı fail etmemesi için)
      # -------------------------------------------------
      - name: Build solution
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        run: |
          dotnet build "${{ steps.find_sln.outputs.sln_file }}" \
            --configuration Release \
            --no-restore \
            /p:TreatWarningsAsErrors=false \
            /p:NoWarn=CS1573,CS1591,CS0618,CS0612

      # -------------------------------------------------
      # SEMGREP (Text Raporu)
      # -------------------------------------------------
      - name: Run Semgrep SAST
        continue-on-error: true
        run: |
          semgrep scan --config auto --text --output security-reports-dir/semgrep-report.txt || true

      # -------------------------------------------------
      # GITLEAKS (Text Raporu)
      # -------------------------------------------------
      - name: Run Gitleaks Secrets Scan
        continue-on-error: true
        run: |
          gitleaks detect --source=. --verbose --report-path=security-reports-dir/gitleaks-raw.json || true
          # Okunabilir formata çevirelim
          gitleaks detect --source=. --verbose > security-reports-dir/gitleaks-report.txt || true

      # -------------------------------------------------
      # TRUFFLEHOG (Text Raporu)
      # -------------------------------------------------
      - name: Run TruffleHog
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --only-verified=false > security-reports-dir/trufflehog-report.txt || true

      # -------------------------------------------------
      # TRIVY FS SCAN -> TEXT RAPORU
      # -------------------------------------------------
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'security-reports-dir/trivy-fs-report.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          exit-code: '0'

      # -------------------------------------------------
      # TRIVY: GENERATE SBOM
      # -------------------------------------------------
      - name: Generate SBOM using Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          format: 'cyclonedx'
          output: 'security-reports-dir/sbom.json'

      # -------------------------------------------------
      # TRIVY: SCAN GENERATED SBOM -> TEXT RAPORU
      # -------------------------------------------------
      - name: Scan Generated SBOM using Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'sbom'
          scan-ref: 'security-reports-dir/sbom.json'
          format: 'table'
          output: 'security-reports-dir/trivy-sbom-report.txt'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      # -------------------------------------------------
      # MERKEZİ HTML DASHBOARD RAPORU OLUŞTURMA
      # -------------------------------------------------
      - name: Generate Centralized HTML Report
        if: always()
        shell: bash
        run: |
          cat << 'EOF' > security-reports-dir/generate_html.py
          import os
          import html

          report_dir = "."
          files_to_load = {
              "Trivy Genel": "trivy-fs-report.txt",
              "Trivy SBOM": "trivy-sbom-report.txt",
              "Semgrep SAST": "semgrep-report.txt",
              "Gitleaks": "gitleaks-report.txt",
              "TruffleHog": "trufflehog-report.txt"
          }

          html_content = """<!DOCTYPE html>
          <html lang="tr">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Merkezi Güvenlik Tarama Raporu</title>
              <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
              <style>
                  body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
                  .nav-pills .nav-link.active { background-color: #0d6efd; }
                  .report-container { background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 8px; font-family: "Courier New", Courier, monospace; white-space: pre-wrap; word-wrap: break-word; overflow-x: auto; max-height: 700px; }
                  .header-banner { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 30px; border-radius: 8px; margin-bottom: 30px; }
              </style>
          </head>
          <body>
          <div class="container my-5">
              <div class="header-banner shadow-sm">
                  <h1 class="display-5 fw-bold">Merkezi Güvenlik Paneli (DevSecOps)</h1>
                  <p class="lead mb-0">Tüm araçların tarama sonuçları tek bir çatı altında birleştirildi.</p>
              </div>
              
              <div class="row">
                  <div class="col-md-3">
                      <div class="nav flex-column nav-pills me-3 shadow-sm bg-white p-3 border rounded" id="v-pills-tab" role="tablist" aria-orientation="vertical">
          """

          # Tab butonlarını üret
          first = True
          for idx, (name, filename) in enumerate(files_to_load.items()):
              active_class = "active" if first else ""
              html_content += f'<button class="nav-link text-start my-1 {active_class}" id="v-pills-{idx}-tab" data-bs-toggle="pill" data-bs-target="#v-pills-{idx}" type="button" role="tab">{name}</button>\n'
              first = False

          html_content += """
                      </div>
                  </div>
                  <div class="col-md-9">
                      <div class="tab-content shadow-sm bg-white p-4 border rounded" id="v-pills-tabContent">
          """

          # Tab içeriklerini (logları) üret
          first = True
          for idx, (name, filename) in enumerate(files_to_load.items()):
              active_class = "show active" if first else ""
              file_path = os.path.join(report_dir, filename)
              
              content = "Bu araç için rapor çıktısı bulunamadı."
              if os.path.exists(file_path):
                  with open(file_path, "r", encoding="utf-8", errors="ignore") as f:
                      content = f.read().strip()
                      if not content:
                          content = "Tarama tamamlandı, herhangi bir bulguya rastlanmadı."

              escaped_content = html.escape(content)
              html_content += f"""
              <div class="tab-pane fade {active_class}" id="v-pills-{idx}" role="tabpanel">
                  <h3 class="mb-3 text-dark border-bottom pb-2">{name} Sonuçları</h3>
                  <div class="report-container">{escaped_content}</div>
              </div>
              """
              first = False

          html_content += """
                      </div>
                  </div>
              </div>
          </div>
          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
          </body>
          </html>
          """

          with open("Merkezi-Guvenlik-Raporu.html", "w", encoding="utf-8") as f:
              f.write(html_content)
          print("Master HTML raporu başarıyla üretildi.")
          EOF
          
          # Script'i çalıştırıp HTML raporunu ana dizine basalım
          cd security-reports-dir && python3 generate_html.py

      # -------------------------------------------------
      # TÜM RAPORLARI TEK BİR ARTIFACT OLARAK YÜKLEME
      # -------------------------------------------------
      - name: Upload Master Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Butun-Guvenlik-Raporlari
          path: security-reports-dir/
