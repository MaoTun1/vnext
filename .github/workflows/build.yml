name: Universal Security Scan

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      #####################################################
      ## CHECKOUT
      #####################################################
      - name: Checkout source code
        uses: actions/checkout@v5

      #####################################################
      ## PYTHON
      #####################################################
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          

      #####################################################
      ## SYSTEM DEPS
      #####################################################
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq pandoc

      #####################################################
      ## SEMGREP
      #####################################################
      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep --config auto --quiet \
          > semgrep-report.txt || true

      #####################################################
      ## GITLEAKS
      #####################################################
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.2"

          curl -sSL \
          "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
          -o gitleaks.tar.gz

          tar -xzf gitleaks.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          git fetch --unshallow || true

          gitleaks detect \
            --report-format json \
            --report-path gitleaks-report.json \
            --redact \
            --verbose \
            || true

      #####################################################
      ## TRUFFLEHOG
      #####################################################
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.90.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_format: json
          output_file: trufflehog-report.json

      #####################################################
      ## TRIVY
      #####################################################
      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          output: trivy-report.txt

      #####################################################
      ## MARKDOWN REPORT
      #####################################################
      - name: Generate Markdown Report
        run: |
          echo "# 🔐 Security Scan Report" > report.md

          echo "## 🧠 Semgrep Findings" >> report.md
          if [ -s semgrep-report.txt ]; then
            echo '```' >> report.md
            cat semgrep-report.txt >> report.md
            echo '```' >> report.md
          else
            echo "No issues found ✅" >> report.md
          fi

          echo "## 🕵️‍♂️ Gitleaks Secrets" >> report.md
          if [ -s gitleaks-report.json ]; then
            jq -r '.[] | "* " + .RuleID + " in `" + .File + "` at line " + (.StartLine | tostring)' \
            gitleaks-report.json >> report.md
          else
            echo "No secrets found ✅" >> report.md
          fi

          echo "## 🔍 TruffleHog History" >> report.md
          if [ -s trufflehog-report.json ]; then
            jq -r '.results[]?.StringsFound[]? | "* Secret in `" + .SourceMetadata.Data + "`"' \
            trufflehog-report.json >> report.md
          else
            echo "No history secrets found ✅" >> report.md
          fi

          echo "## 📦 Trivy Dependency Scan" >> report.md
          if [ -s trivy-report.txt ]; then
            echo '```' >> report.md
            cat trivy-report.txt >> report.md
            echo '```' >> report.md
          else
            echo "No vulnerabilities found ✅" >> report.md
          fi

      #####################################################
      ## HTML REPORT
      #####################################################
      - name: Convert Markdown to HTML
        run: |
          mkdir -p public
          pandoc report.md -o public/index.html

      #####################################################
      ## GITHUB PAGES
      #####################################################
      - name: Upload HTML to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      #####################################################
      ## ARTIFACT
      #####################################################
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          path: report.md

      #####################################################
      ## STEP SUMMARY
      #####################################################
      - name: GitHub Summary UI
        run: |
          echo "### 🔐 Security Scan Completed" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 [Download report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 [View full HTML report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY

      #####################################################
      ## PR COMMENT
      #####################################################
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: security-scan
          message: |
            ✅ Security scan completed

            📄 Markdown Report:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            🌐 HTML Report:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
