name: Security Scan

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # NODE.JS SETUP (JavaScript Paket Çözümlemesi İçin)
      # -------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # -------------------------------------------------
      # .NET SETUP
      # -------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # -------------------------------------------------
      # FIND SOLUTION
      # -------------------------------------------------
      - name: Find solution file
        id: find_sln
        shell: bash
        run: |
          SLN_FILE=$(find . -name "*.sln" | head -n 1)

          if [ -z "$SLN_FILE" ]; then
            echo "No solution file found"
            echo "sln_exists=false" >> $GITHUB_OUTPUT
          else
            echo "Found solution: $SLN_FILE"
            echo "sln_exists=true" >> $GITHUB_OUTPUT
            echo "sln_file=$SLN_FILE" >> $GITHUB_OUTPUT
          fi

      # -------------------------------------------------
      # RESTORE & PREPARE DEPENDENCIES (C# & JS)
      # -------------------------------------------------
      - name: Restore dependencies
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        run: |
          dotnet restore "${{ steps.find_sln.outputs.sln_file }}" --use-lock-file
          if [ -f package.json ]; then npm install --package-lock-only; fi

      # -------------------------------------------------
      # BUILD (NON-BLOCKING)
      # -------------------------------------------------
      - name: Build solution
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        run: |
          dotnet build "${{ steps.find_sln.outputs.sln_file }}" \
            --configuration Release \
            --no-restore

      # -------------------------------------------------
      # SEMGREP
      # -------------------------------------------------
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/security-audit
            p/secrets
            p/owasp-top-ten

      # -------------------------------------------------
      # GITLEAKS
      # -------------------------------------------------
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------
      # TRUFFLEHOG
      # -------------------------------------------------
      - name: Run TruffleHog
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --only-verified=false \
            --json > trufflehog-results.json || true

          echo "TruffleHog scan completed"

      # -------------------------------------------------
      # TRIVY FS SCAN (Genel Dosya Sistemi Taraması)
      # -------------------------------------------------
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

      # -------------------------------------------------
      # TRIVY: GENERATE SBOM (C# ve JS Paketlerini Toplar)
      # -------------------------------------------------
      - name: Generate SBOM using Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          format: 'cyclonedx'
          output: 'sbom.json'

      # -------------------------------------------------
      # TRIVY: SCAN GENERATED SBOM
      # -------------------------------------------------
      - name: Scan Generated SBOM using Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'sbom'
          scan-ref: 'sbom.json'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          # Not: Eğer kritik açıkta pipeline dursun isterseniz alt satırı aktifleştirebilirsiniz:
          # exit-code: '1' 

      # -------------------------------------------------
      # UPLOAD REPORTS
      # -------------------------------------------------
      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            trufflehog-results.json
            sbom.json
