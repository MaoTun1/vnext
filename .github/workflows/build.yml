name: Universal Security Scan

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      #####################################################
      ## CHECKOUT
      #####################################################
      - name: Checkout source code
        uses: actions/checkout@v4

      #####################################################
      ## .NET SETUP + DEPENDENCY GENERATION
      #####################################################
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Restore dependencies (generate dependency graph)
        run: dotnet restore --use-lock-file

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      #####################################################
      ## CACHE (optional but recommended)
      #####################################################
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}

      #####################################################
      ## SEMGREP
      #####################################################
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep --config auto --json --output semgrep.json || true

      #####################################################
      ## TRIVY (NOW USES DOTNET LOCK FILES)
      #####################################################
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,config
          format: table
          output: trivy-report.txt

      #####################################################
      ## TRUFFLEHOG (FIXED USAGE)
      #####################################################
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          extra_args: --only-verified --json

      #####################################################
      ## REPORT GENERATION
      #####################################################
      - name: Generate Markdown Report
        run: |
          echo "# 🔐 Security Scan Report" > report.md
          echo "Generated: $(date -u)" >> report.md

          echo "## 🧠 Semgrep Findings" >> report.md
          if [ -s semgrep.json ]; then
            cat semgrep.json >> report.md
          else
            echo "No issues found ✅" >> report.md
          fi

          echo "## 🐷 TruffleHog Secrets" >> report.md
          echo "See workflow logs for details (JSON output enabled)" >> report.md

          echo "## 📦 Trivy Results" >> report.md
          if [ -s trivy-report.txt ]; then
            echo '```' >> report.md
            cat trivy-report.txt >> report.md
            echo '```' >> report.md
          else
            echo "No vulnerabilities found ✅" >> report.md
          fi

      #####################################################
      ## PAGES BUILD
      #####################################################
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          environment:
            name: github-pages

      #####################################################
      ## ARTIFACT
      #####################################################
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: report.md

      #####################################################
      ## SUMMARY UI
      #####################################################
      - name: GitHub Summary
        run: |
          echo "### 🔐 Security Scan Completed" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 Artifact available in Actions run" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 GitHub Pages report deployed" >> $GITHUB_STEP_SUMMARY

      #####################################################
      ## PR COMMENT
      #####################################################
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: security-scan
          message: |
            ✅ Security scan completed
            📄 Report available in Actions artifacts
            🌐 Pages report deployed
