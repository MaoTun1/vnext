name: Ultimate Security Scan

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # ORTAM KURULUMLARI (Node.js & .NET)
      # -------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # En güncel LTS sürümüne çekildi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # -------------------------------------------------
      # GITLEAKS & SEMGREP CLI KURULUMLARI
      # -------------------------------------------------
      # Hatalı hazır action'lar yerine doğrudan kararlı çalışan CLI araçlarını kuruyoruz
      - name: Install Tools (Gitleaks & Semgrep)
        run: |
          mkdir -p security-reports-dir
          # Gitleaks Kurulumu
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xf gitleaks_8.18.2_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          # Semgrep Kurulumu
          pip install semgrep

      # -------------------------------------------------
      # FIND SOLUTION & RESTORE
      # -------------------------------------------------
      - name: Find solution file
        id: find_sln
        shell: bash
        run: |
          SLN_FILE=$(find . -name "*.sln" | head -n 1)
          if [ -z "$SLN_FILE" ]; then
            echo "sln_exists=false" >> $GITHUB_OUTPUT
          else
            echo "sln_exists=true" >> $GITHUB_OUTPUT
            echo "sln_file=$SLN_FILE" >> $GITHUB_OUTPUT
          fi

      - name: Restore dependencies
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        run: |
          dotnet restore "${{ steps.find_sln.outputs.sln_file }}" --use-lock-file
          if [ -f package.json ]; then npm install --package-lock-only; fi

      # -------------------------------------------------
      # BUILD (Uyarılardan dolayı fail etmemesi için iyileştirildi)
      # -------------------------------------------------
      - name: Build solution
        if: steps.find_sln.outputs.sln_exists == 'true'
        continue-on-error: true
        run: |
          # /p:NoWarn ve /p:TreatWarningsAsErrors=false ile XML param ve Obsolete uyarılarının build'ı bozması engellendi
          dotnet build "${{ steps.find_sln.outputs.sln_file }}" \
            --configuration Release \
            --no-restore \
            /p:TreatWarningsAsErrors=false \
            /p:NoWarn=CS1573,CS1591,CS0618,CS0612

      # -------------------------------------------------
      # SEMGREP (Kusursuz SARIF Çıktısı)
      # -------------------------------------------------
      - name: Run Semgrep SAST
        continue-on-error: true
        run: |
          semgrep scan --config auto --sarif --output security-reports-dir/semgrep.sarif || true

      # -------------------------------------------------
      # GITLEAKS (Kusursuz SARIF Çıktısı)
      # -------------------------------------------------
      - name: Run Gitleaks Secrets Scan
        continue-on-error: true
        run: |
          gitleaks detect --source=. --format=sarif --report-path=security-reports-dir/gitleaks.sarif || true

      # -------------------------------------------------
      # TRUFFLEHOG (Detaylı Markdown Raporu)
      # -------------------------------------------------
      - name: Run TruffleHog
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --only-verified=false > security-reports-dir/Trufflehog-Secret-Raporu.md || true

      # -------------------------------------------------
      # TRIVY FS SCAN -> HTML RAPORU
      # -------------------------------------------------
      - name: Run Trivy Filesystem Scan (HTML)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'template'
          template: '@contrib/html.tpl'
          output: 'security-reports-dir/Trivy-Genel-Zafiyet-Raporu.html'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          exit-code: '0' # Rapor üretilirken pipeline'ın kırılmasını önler

      # -------------------------------------------------
      # TRIVY: GENERATE SBOM (Ham Veri)
      # -------------------------------------------------
      - name: Generate SBOM using Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          format: 'cyclonedx'
          output: 'security-reports-dir/sbom.json'

      # -------------------------------------------------
      # TRIVY: SCAN GENERATED SBOM -> HTML RAPORU
      # -------------------------------------------------
      - name: Scan Generated SBOM using Trivy (HTML)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'sbom'
          scan-ref: 'security-reports-dir/sbom.json'
          format: 'template'
          template: '@contrib/html.tpl'
          output: 'security-reports-dir/Trivy-SBOM-Zafiyet-Raporu.html'
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # Rapor üretilirken pipeline'ın kırılmasını önler

      # -------------------------------------------------
      # DİĞER ARAÇLARIN LOGLARINI GÜZELLEŞTİRME (Trivy Convert HTML)
      # -------------------------------------------------
      - name: Convert Other SARIFs to HTML using Trivy CLI
        if: always()
        shell: bash
        run: |
          if [ -f security-reports-dir/semgrep.sarif ]; then
            docker run --rm -v "$PWD/security-reports-dir:/reports" aquasec/trivy:latest convert \
              --format template --template "@contrib/html.tpl" --output /reports/Semgrep-Kod-Analiz-Raporu.html /reports/semgrep.sarif || true
          fi
          
          if [ -f security-reports-dir/gitleaks.sarif ]; then
            docker run --rm -v "$PWD/security-reports-dir:/reports" aquasec/trivy:latest convert \
              --format template --template "@contrib/html.tpl" --output /reports/Gitleaks-Secret-Raporu.html /reports/gitleaks.sarif || true
          fi

      # -------------------------------------------------
      # TÜM RAPORLARI TEK BİR ARTIFACT OLARAK YÜKLEME
      # -------------------------------------------------
      - name: Upload Master Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Butun-Guvenlik-Raporlari
          path: security-reports-dir/
