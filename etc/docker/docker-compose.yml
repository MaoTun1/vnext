services:

  init:
    build:
      context: ../../
      dockerfile: init/VNext.Init.Host/Dockerfile
    container_name: init
    environment:
      - env.default
      - PACKAGE_API_PORT=3000
    volumes:
      - npm-cache:/app/.npm-cache
    ports:
      - "3005:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - bbt-development
    depends_on:
      - redis
      - postgres
    restart: "no"
  
  vnext-orchestration-dapr:
    image: "daprio/daprd"
    container_name: vnext-orchestration-dapr
    command: [
      "./daprd",
      "--app-id", "vnext-app",
      "--app-port", "4201",
      "--resources-path", "./components",
      "--dapr-grpc-port", "42111",
      "--dapr-http-port", "42110",
      "--scheduler-host-address", "dapr-scheduler:50007",
      "--placement-host-address", "dapr-placement:50005",
      "--app-channel-address", "host.orb.local"
    ]
    volumes:
      - "../../etc/orchestration/dapr/components:/components"
    ports:
      - "42110:42110"
      - "42111:42111"
    networks:
      - bbt-development
    extra_hosts:
      - "host.orb.local:host-gateway"
    depends_on:
      - dapr-placement
      - dapr-scheduler
      - redis
      - vault
        
  vnext-execution-dapr:
    image: "daprio/daprd"
    container_name: vnext-execution-dapr
    command: [
      "./daprd",
      "--app-id", "vnext-execution-app",
      "--app-port", "4202",
      "--resources-path", "./components",
      "--dapr-grpc-port", "43111",
      "--dapr-http-port", "43110",
      "--scheduler-host-address", "dapr-scheduler:50007",
      "--placement-host-address", "dapr-placement:50005",
      "--app-channel-address", "host.orb.local"
    ]
    volumes:
      - "../../etc/execution/dapr/components:/components"
    ports:
      - "43110:43110"
      - "43111:43111"
    networks:
      - bbt-development
    extra_hosts:
      - "host.orb.local:host-gateway"
    depends_on:
      - dapr-placement
      - dapr-scheduler
      - redis
      - vault
        
  vnext-worker-outbox-dapr:
    image: "daprio/daprd"
    container_name: vnext-worker-outbox-dapr
    command: [
      "./daprd",
      "--app-id", "vnext-worker-outbox",
      "--app-port", "4401",
      "--resources-path", "./components",
      "--dapr-grpc-port", "44111",
      "--dapr-http-port", "44110",
      "--scheduler-host-address", "dapr-scheduler:50007",
      "--placement-host-address", "dapr-placement:50005",
      "--app-channel-address", "host.orb.local"
    ]
    volumes:
      - "../../etc/workers/dapr/components:/components"
    ports:
      - "44110:44110"
      - "44111:44111"
    networks:
      - bbt-development
    extra_hosts:
      - "host.orb.local:host-gateway"
    depends_on:
      - dapr-placement
      - dapr-scheduler
      - redis
      - vault
        
  vnext-worker-inbox-dapr:
    image: "daprio/daprd"
    container_name: vnext-worker-inbox-dapr
    command: [
      "./daprd",
      "--app-id", "vnext-worker-inbox",
      "--app-port", "4501",
      "--resources-path", "./components",
      "--dapr-grpc-port", "45111",
      "--dapr-http-port", "45110",
      "--scheduler-host-address", "dapr-scheduler:50007",
      "--placement-host-address", "dapr-placement:50005",
      "--app-channel-address", "host.orb.local"
    ]
    volumes:
      - "../../etc/workers/dapr/components:/components"
    ports:
      - "45110:45110"
      - "45111:45111"
    networks:
      - bbt-development
    extra_hosts:
      - "host.orb.local:host-gateway"
    depends_on:
      - dapr-placement
      - dapr-scheduler
      - redis
      - vault
  
  # Mockoon API Mock Server
  mockoon:
    image: mockoon/cli:latest
    container_name: migration-mockoon
    command: ["--data", "/data/migration-api.json", "--port", "3001", "--hostname", "0.0.0.0"]
    ports:
      - "3001:3001"
    volumes:
      - ./config/mockoon:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bbt-development

  mockoon-dapr:
    image: "daprio/daprd:latest"
    container_name: mockoon-dapr
    command:
      [
        "./daprd",
        "--app-id", "mockoon",
        "--app-port", "3001",
        "--resources-path", "./components",
        "--dapr-grpc-port", "3501",
        "--dapr-http-port", "3500",
        "--scheduler-host-address", "dapr-scheduler:50007",
        "--placement-host-address", "dapr-placement:50005"
      ]
    volumes:
      - "../mockoon/dapr/components:/components"
    network_mode: "service:mockoon"
    depends_on:
      - mockoon
      - dapr-placement
      - dapr-scheduler

  dapr-placement:
    image: "daprio/dapr"
    container_name: dapr-placement
    command: ["./placement"]
    ports:
      - "50005:50005"
    networks:
      - bbt-development

  dapr-scheduler:
    image: "daprio/scheduler"
    container_name: dapr-scheduler
    user: "0:0"
    command: [
      "./scheduler", 
      "--port", 
      "50007", 
      "--etcd-data-dir", 
      "/data"
    ]
    ports:
      - "50007:50007"
    volumes:
      - type: tmpfs
        target: /data
        tmpfs:
          size: "64m"
          mode: 1777
    networks:
      - bbt-development

  redis:
    container_name: vnext-redis
    image: redis:latest
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis:/data
    networks:
      - bbt-development

  postgres:
    container_name: vnext-postgres
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - bbt-development

  vault:
    container_name: vnext-vault
    image: vault:1.13.3
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: 'https://0.0.0.0:8200'
      VAULT_API_ADDR: 'https://0.0.0.0:8200'
      VAULT_DEV_ROOT_TOKEN_ID: 'admin'
      VAULT_TOKEN: 'admin'
    volumes:
      - ./config/vault:/vault/file
    cap_add:
      - IPC_LOCK
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "--proxy",
          "off",
          "http://vault:8200/v1/sys/health?standbyok=true",
        ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    command: server -dev -dev-root-token-id="admin"
    networks:
      - bbt-development

  vault-prepopulate:
    image: alpine/curl:latest
    depends_on:
      - vault
    volumes:
      - ./config/vault/vault.sh:/etc/vault/prepopulate_vault.sh
    command: ["sh", "-c", "chmod +x /etc/vault/prepopulate_vault.sh && /etc/vault/prepopulate_vault.sh"]
    networks:
      - bbt-development

  # OpenObserve for observability
  openobserve:
    container_name: vnext-openobserve
    image: public.ecr.aws/zinclabs/openobserve:latest
    environment:
      ZO_ROOT_USER_EMAIL: "root@example.com"
      ZO_ROOT_USER_PASSWORD: "Complexpass#@123"
      ZO_DATA_DIR: "/data"
    ports:
      - "5080:5080"
    volumes:
      - openobserve:/data
    networks:
      - bbt-development

  # OpenTelemetry Collector
  otel-collector:
    container_name: vnext-otel-collector
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./config/otel/otel-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "1888:1888" # pprof extension
      - "8888:8888" # Prometheus metrics exposed by the Collector
      - "8889:8889" # Prometheus exporter metrics
      - "13133:13133" # health_check extension
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP http receiver
      - "55679:55679" # zpages extension
    depends_on:
      - openobserve
    networks:
      - bbt-development

networks:
  bbt-development:
    external: true

volumes:
  redis:
  postgres:
  openobserve:
  npm-cache: {}
