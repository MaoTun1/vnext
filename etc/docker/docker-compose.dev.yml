services:

  vnext-app:
    container_name: vnext-app
    build:
      context: ../..
      dockerfile: orchestration/BBT.Workflow.Orchestration.HttpApi.Host/Dockerfile.dev
    env_file:
      - .env.orchestration.dev
    ports:
      - "4201:5000"
    volumes:
      - ../..:/app
      - /app/orchestration/BBT.Workflow.Orchestration.HttpApi.Host/obj/
      - /app/orchestration/BBT.Workflow.Orchestration.HttpApi.Host/bin/
      - /app/src/BBT.Workflow.Domain/obj/
      - /app/src/BBT.Workflow.Domain/bin/
      - /app/src/BBT.Workflow.Application/obj/
      - /app/src/BBT.Workflow.Application/bin/
      - /app/src/BBT.Workflow.Infrastructure/obj/
      - /app/src/BBT.Workflow.Infrastructure/bin/
      - /app/src/BBT.Workflow.HttpApi.Shared/obj/
      - /app/src/BBT.Workflow.HttpApi.Shared/bin/
    working_dir: /app
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health" ]
      interval: 15s
      retries: 8
      start_period: 90s
      timeout: 10s
    networks:
      - bbt-development
    depends_on:
      - dapr-placement
      - dapr-scheduler
      - postgres
        
  vnext-execution-app:
    container_name: vnext-execution-app
    build:
      context: ../..
      dockerfile: execution/BBT.Workflow.Execution.HttpApi.Host/Dockerfile.dev
    env_file:
      - .env.execution.dev
    ports:
      - "4202:5000"
    volumes:
      - ../..:/app
      - /app/execution/BBT.Workflow.Execution.HttpApi.Host/obj/
      - /app/execution/BBT.Workflow.Execution.HttpApi.Host/bin/
      - /app/src/BBT.Workflow.Domain/obj/
      - /app/src/BBT.Workflow.Domain/bin/
      - /app/src/BBT.Workflow.Application/obj/
      - /app/src/BBT.Workflow.Application/bin/
      - /app/src/BBT.Workflow.Infrastructure/obj/
      - /app/src/BBT.Workflow.Infrastructure/bin/
      - /app/src/BBT.Workflow.HttpApi.Shared/obj/
      - /app/src/BBT.Workflow.HttpApi.Shared/bin/
    working_dir: /app
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health" ]
      interval: 15s
      retries: 8
      start_period: 90s
      timeout: 10s
    networks:
      - bbt-development
    depends_on:
      - dapr-placement
      - dapr-scheduler
      - postgres

  init:
    build:
      context: ../../
      dockerfile: init/VNext.Init.Host/Dockerfile
    container_name: init
    env_file:
      - env.dev
    environment:
      - PACKAGE_API_PORT=3000
    ports:
      - "3005:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - npm-cache:/app/.npm-cache
    networks:
      - bbt-development
    depends_on:
      - vnext-app
      - redis
      - postgres
    restart: "no"
  
  vnext-orchestration-dapr:
    image: "daprio/daprd"
    container_name: vnext-orchestration-dapr
    command: [
      "./daprd",
      "--app-id", "vnext-app",
      "--app-port", "5000",
      "--resources-path", "./components",
      "--dapr-grpc-port", "42111",
      "--dapr-http-port", "42110",
      "--scheduler-host-address", "dapr-scheduler:50007",
      "--placement-host-address", "dapr-placement:50005"
    ]
    volumes:
      - "../../etc/orchestration/dapr/components:/components"
    network_mode: "service:vnext-app"
    depends_on:
      - vnext-app
      - dapr-placement
      - dapr-scheduler
      - redis
      - vault
  
  vnext-execution-dapr:
    image: "daprio/daprd"
    container_name: vnext-execution-dapr
    command: [
      "./daprd",
      "--app-id", "vnext-execution-app",
      "--app-port", "5000",
      "--resources-path", "./components",
      "--dapr-grpc-port", "43111",
      "--dapr-http-port", "43110",
      "--scheduler-host-address", "dapr-scheduler:50007",
      "--placement-host-address", "dapr-placement:50005"
    ]
    volumes:
      - "../../etc/execution/dapr/components:/components"
    network_mode: "service:vnext-execution-app"
    depends_on:
      - vnext-execution-app
      - dapr-placement
      - dapr-scheduler
      - redis
      - vault

  vnext-db-migrator-dapr:
    image: "daprio/daprd"
    container_name: vnext-db-migrator-dapr
    command: [
      "./daprd",
      "--app-id", "vnext-db-migrator",
      "--resources-path", "./components",
      "--dapr-grpc-port", "44211",
      "--dapr-http-port", "44210",
      "--scheduler-host-address", "dapr-scheduler:50007",
      "--placement-host-address", "dapr-placement:50005"
    ]
    volumes:
      - "../../etc/workers/db-migrator/dapr/components:/components"
    ports:
      - "44210:44210"
      - "44211:44211"
    networks:
      - bbt-development
    depends_on:
      - dapr-placement
      - dapr-scheduler
      - redis
      - vault

  vnext-db-migrator:
    container_name: vnext-db-migrator
    build:
      context: ../..
      dockerfile: workers/BBT.Workflow.DbMigrator/Dockerfile.dev
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=Aether_WorkflowDb;Username=postgres;Password=postgres;"
      DAPR_HTTP_PORT: "44210"
      DAPR_GRPC_PORT: "44211"
      DAPR_LOCK_STORE_NAME: "vnext-lock"
      ASPNETCORE_ENVIRONMENT: "Development"
    volumes:
      - ../..:/app
      - /app/workers/BBT.Workflow.DbMigrator/obj/
      - /app/workers/BBT.Workflow.DbMigrator/bin/
      - /app/src/BBT.Workflow.Domain/obj/
      - /app/src/BBT.Workflow.Domain/bin/
      - /app/src/BBT.Workflow.Infrastructure/obj/
      - /app/src/BBT.Workflow.Infrastructure/bin/
      - /app/src/BBT.Workflow.HttpApi.Shared/obj/
      - /app/src/BBT.Workflow.HttpApi.Shared/bin/
    working_dir: /app
    network_mode: "service:vnext-db-migrator-dapr"
    depends_on:
      - vnext-db-migrator-dapr
      - postgres
      - redis
    restart: "no"

  dapr-placement:
    image: "daprio/dapr"
    container_name: dapr-placement
    command: [ "./placement", "--port", "50005" ]
    ports:
      - "50005:50005"
    networks:
      - bbt-development

  dapr-scheduler:
    image: "daprio/scheduler"
    container_name: dapr-scheduler
    user: "0:0"
    command: [
      "./scheduler",
      "--port",
      "50007",
      "--etcd-data-dir",
      "/data"
    ]
    ports:
      - "50007:50007"
    volumes:
      - type: tmpfs
        target: /data
        tmpfs:
          size: "64m"
          mode: 1777
    networks:
      - bbt-development

  redis:
    container_name: vnext-redis
    image: redis:latest
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis:/data
    networks:
      - bbt-development

  postgres:
    container_name: vnext-postgres
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - bbt-development

  vault:
    container_name: vnext-vault
    image: vault:1.13.3
    restart: on-failure:10
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: 'https://0.0.0.0:8200'
      VAULT_API_ADDR: 'https://0.0.0.0:8200'
      VAULT_DEV_ROOT_TOKEN_ID: 'admin'
      VAULT_TOKEN: 'admin'
    volumes:
      - ./config/vault:/vault/file
    cap_add:
      - IPC_LOCK
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "--proxy",
          "off",
          "http://vault:8200/v1/sys/health?standbyok=true",
        ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    command: server -dev -dev-root-token-id="admin"
    networks:
      - bbt-development

  vault-prepopulate:
    image: alpine/curl:latest
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - ./config/vault/vault.sh:/etc/vault/prepopulate_vault.sh
    command: [ "sh", "-c", "chmod +x /etc/vault/prepopulate_vault.sh && /etc/vault/prepopulate_vault.sh" ]
    networks:
      - bbt-development

  # OpenObserve for observability
  openobserve:
    container_name: vnext-openobserve
    image: public.ecr.aws/zinclabs/openobserve:latest
    environment:
      ZO_ROOT_USER_EMAIL: "root@example.com"
      ZO_ROOT_USER_PASSWORD: "Complexpass#@123"
      ZO_DATA_DIR: "/data"
    ports:
      - "5080:5080"
    volumes:
      - openobserve:/data
    networks:
      - bbt-development

  # OpenTelemetry Collector
  otel-collector:
    container_name: vnext-otel-collector
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./config/otel/otel-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "1888:1888" # pprof extension
      - "8888:8888" # Prometheus metrics exposed by the Collector
      - "8889:8889" # Prometheus exporter metrics
      - "13133:13133" # health_check extension
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP http receiver
      - "55679:55679" # zpages extension
    depends_on:
      - openobserve
    networks:
      - bbt-development

  mockoon:
    image: mockoon/cli:${MOCKOON_VERSION:-latest}
    container_name: migration-mockoon
    command: ["--data", "/data/migration-api.json", "--port", "3001", "--hostname", "0.0.0.0"]
    ports:
      - "3001:3001"
    volumes:
      - ./config/mockoon:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bbt-development

networks:
  bbt-development:
    external: true

volumes:
  redis:
  postgres:
  openobserve:
  vnext-app:
  vnext-execution-app:
  npm-cache: {}
